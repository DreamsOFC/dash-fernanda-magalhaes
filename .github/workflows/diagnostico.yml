name: Diagnostico (temporario)

# Só manual. Não commita nada, não expõe token. Usado para descobrir as métricas
# reais da conta antes de reescrever a coleta. Pode ser apagado depois.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - name: Rodar diagnostico
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python scripts/diagnostico.py
